# =============================================================================
# secrets/gitleaks.toml – TigerGate CNAPP: Custom Gitleaks Configuration
# =============================================================================
# PURPOSE: A Gitleaks config tuned specifically for detecting the patterns in
# this repository. Use with: gitleaks detect --config secrets/gitleaks.toml
# =============================================================================
title = "TigerGate CNAPP – Gitleaks Custom Ruleset"

[extend]
useDefault = true   # Use all default rules PLUS the custom ones below

[[rules]]
id          = "tigergate-aws-access-key"
description = "AWS Access Key ID (TigerGate test pattern)"
regex       = '''AKIA[0-9A-Z]{16}'''
tags        = ["aws", "credentials", "tigergate"]
severity    = "CRITICAL"

[[rules]]
id          = "tigergate-gcp-api-key"
description = "GCP API Key"
regex       = '''AIza[0-9A-Za-z\-_]{35}'''
tags        = ["gcp", "api-key", "tigergate"]
severity    = "CRITICAL"

[[rules]]
id          = "tigergate-stripe-live-key"
description = "Stripe Live Secret Key"
regex       = '''sk_live_[0-9a-zA-Z]{24}'''
tags        = ["stripe", "payment", "pci-dss"]
severity    = "CRITICAL"

[[rules]]
id          = "tigergate-slack-token"
description = "Slack Bot or User Token"
regex       = '''xox[baprs]-[0-9a-zA-Z]{10,48}'''
tags        = ["slack", "messaging"]
severity    = "HIGH"

[[rules]]
id          = "tigergate-github-pat"
description = "GitHub Personal Access Token"
regex       = '''ghp_[0-9a-zA-Z]{36}'''
tags        = ["github", "scm"]
severity    = "CRITICAL"

[[rules]]
id          = "tigergate-jwt-secret"
description = "Hardcoded JWT signing secret pattern"
regex       = '''(?i)(jwt[_\-]?secret|signing[_\-]?key)\s*[=:]\s*["']?[a-zA-Z0-9_\-]{8,}'''
tags        = ["jwt", "auth"]
severity    = "HIGH"

[[rules]]
id          = "tigergate-db-password"
description = "Database password in source code"
regex       = '''(?i)(db[_\-]?password|database[_\-]?pass|mysql[_\-]?pass|postgres[_\-]?pass)\s*[=:]\s*["']?[^\s"']{8,}'''
tags        = ["database", "credentials"]
severity    = "HIGH"

[[rules]]
id          = "tigergate-openai-key"
description = "OpenAI or Anthropic API Key"
regex       = '''(sk-proj-|sk-ant-api03-)[0-9a-zA-Z-_]{20,}'''
tags        = ["ai", "llm", "api-key"]
severity    = "HIGH"

[allowlist]
description = "Allow test fixture patterns (obvious fakes)"
regexes     = [
  "EXAMPLE",
  "ABCDEF",
  "PLACEHOLDER",
  "YOUR_KEY_HERE"
]
paths       = [
  ".*/test/.*",
  ".*/fixtures/.*"
]
