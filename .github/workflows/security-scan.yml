name: "🔐 TigerGate Security Scan Pipeline"
# =============================================================================
# .github/workflows/security-scan.yml – TigerGate CNAPP DevSecOps Pipeline
# =============================================================================
# Fixed: 2026-04-28
#   - Checkov: added continue-on-error, fixed --soft-fail and SARIF fallback
#   - Trivy: switched to apt install (more reliable), fixed SARIF path, fallback
#   - Hadolint: added no-fail, fixed failure-threshold
#   - All SARIF uploads: conditional on file existence
# =============================================================================

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ── Stage 1: Secrets Detection (Gitleaks) ────────────────────────────────
  secrets-scan:
    name: "1/5 Secrets Scan (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run Gitleaks (report only)
        run: |
          gitleaks detect \
            --source . \
            --config secrets/gitleaks.toml \
            --no-git \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 0 \
            --verbose 2>&1 | tail -5 || true
          FINDINGS=$(cat gitleaks-report.json 2>/dev/null | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 0)" 2>/dev/null || echo "0")
          echo "Secrets found: $FINDINGS (expected — intentional test repo)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  # ── Stage 2: SAST (Semgrep) ───────────────────────────────────────────────
  sast:
    name: "2/5 SAST (Semgrep)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep --quiet

      - name: Run Semgrep SAST
        continue-on-error: true
        run: |
          semgrep \
            --config p/python \
            --config p/javascript \
            --config p/php \
            --config p/owasp-top-ten \
            --metrics=off \
            --quiet \
            --json \
            --output semgrep-results.json \
            . 2>/dev/null || true
          COUNT=$(python3 -c "import json; d=json.load(open('semgrep-results.json')); print(len(d.get('results',[])))" 2>/dev/null || echo "0")
          echo "SAST findings: $COUNT"

      - name: Generate Semgrep SARIF
        run: |
          python3 - << 'EOF'
          import json
          try:
              with open('semgrep-results.json') as f:
                  data = json.load(f)
              results = data.get('results', [])
              sarif = {
                "version": "2.1.0",
                "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
                "runs": [{
                  "tool": {"driver": {"name": "Semgrep", "version": "1.0", "rules": []}},
                  "results": [{
                    "ruleId": r.get("check_id", "unknown"),
                    "message": {"text": r.get("extra", {}).get("message", "finding")},
                    "locations": [{"physicalLocation": {
                      "artifactLocation": {"uri": r.get("path","unknown")},
                      "region": {"startLine": r.get("start",{}).get("line",1)}
                    }}],
                    "level": "warning"
                  } for r in results[:100]]
                }]
              }
              with open('semgrep.sarif', 'w') as f:
                  json.dump(sarif, f)
              print(f"SARIF generated with {len(results)} findings")
          except Exception as e:
              print(f"Using empty SARIF fallback: {e}")
              with open('semgrep.sarif', 'w') as f:
                  json.dump({"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}, f)
          EOF

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-results.json

  # ── Stage 3: IaC Security (Checkov) ──────────────────────────────────────
  iac-scan:
    name: "3/5 IaC Security (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov --quiet

      - name: Run Checkov (soft-fail — violations expected)
        continue-on-error: true
        run: |
          checkov \
            --directory . \
            --framework terraform cloudformation kubernetes \
            --soft-fail \
            --compact \
            --quiet \
            --output json \
            --output-file checkov-results.json 2>/dev/null || true
          echo "Checkov scan complete (soft-fail mode — violations expected)"

      - name: Generate Checkov SARIF (soft-fail)
        continue-on-error: true
        run: |
          checkov \
            --directory cspm/ \
            --framework terraform \
            --soft-fail \
            --compact \
            --quiet \
            --output sarif \
            --output-file checkov.sarif 2>/dev/null || true
          # Ensure valid SARIF exists as fallback
          if [ ! -s checkov.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Checkov","rules":[]}},"results":[]}]}' > checkov.sarif
          fi
          echo "Checkov SARIF ready"

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: checkov-results.json

  # ── Stage 4: Container & SCA (Trivy + Hadolint) ──────────────────────────
  container-scan:
    name: "4/5 Container & SCA (Trivy + Hadolint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy via apt
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy
          trivy --version

      - name: Run Trivy filesystem SCA
        continue-on-error: true
        run: |
          trivy fs . \
            --format json \
            --output trivy-fs-results.json \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --quiet 2>/dev/null || true
          VULNS=$(python3 -c "import json; d=json.load(open('trivy-fs-results.json')); print(sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results',[])))" 2>/dev/null || echo "?")
          echo "CVEs found: $VULNS (expected — intentionally vulnerable deps)"

      - name: Generate Trivy SARIF
        continue-on-error: true
        run: |
          trivy fs . \
            --format sarif \
            --output trivy.sarif \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --quiet 2>/dev/null || true
          # Ensure SARIF exists as fallback
          if [ ! -s trivy.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' > trivy.sarif
          fi
          echo "Trivy SARIF ready: $(wc -c < trivy.sarif) bytes"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Install Hadolint
        continue-on-error: true
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
          hadolint --version

      - name: Run Hadolint on all Dockerfiles
        continue-on-error: true
        run: |
          echo "=== Hadolint Dockerfile Analysis ==="
          find . -name "Dockerfile*" \
            -not -path './.git/*' \
            -not -path './node_modules/*' | while read df; do
            ISSUES=$(hadolint --format json "$df" 2>/dev/null | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "?")
            echo "  $df: $ISSUES issues"
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sca-report
          path: trivy-fs-results.json

  # ── Stage 5: Compliance Summary ───────────────────────────────────────────
  compliance-report:
    name: "5/5 Compliance Summary"
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast, iac-scan, container-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate compliance summary
        run: |
          TOTAL=$(grep -r "🔴" . \
            --include="*.py" --include="*.js" --include="*.tf" \
            --include="*.yaml" --include="*.yml" --include="*.sh" \
            --include="*.php" --include="*.java" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            2>/dev/null | wc -l || echo "0")
          FILES=$(grep -r "🔴" . \
            --include="*.py" --include="*.js" --include="*.tf" \
            --include="*.yaml" --include="*.yml" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            -l 2>/dev/null | wc -l || echo "0")

          cat > compliance-report.md << EOF
          # TigerGate CNAPP Compliance Report
          **Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Commit**: ${GITHUB_SHA}
          **Branch**: ${GITHUB_REF_NAME}

          ## Coverage: $TOTAL vulnerability markers across $FILES files

          | Framework | Status | Location |
          |-----------|--------|----------|
          | PCI-DSS v4.0 | ❌ INTENTIONAL FAIL | industry/fintech/ |
          | HIPAA Security Rule | ❌ INTENTIONAL FAIL | industry/healthcare/ |
          | FedRAMP Moderate | ❌ INTENTIONAL FAIL | industry/government/ |
          | CIS AWS Benchmark | ❌ INTENTIONAL FAIL | cspm/aws_insecure.tf |
          | CIS K8s Benchmark | ❌ INTENTIONAL FAIL | kspm/ |
          | OWASP Top 10 | ❌ INTENTIONAL FAIL | sast_advanced/ |
          | SOC 2 Type II | ❌ INTENTIONAL FAIL | secrets/, dspm/ |

          > ⚠️ All failures are intentional — this is a CNAPP scanner test suite.
          EOF
          cat compliance-report.md

      - uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('compliance-report.md')
              ? fs.readFileSync('compliance-report.md', 'utf8')
              : 'Compliance report not available.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔐 TigerGate Security Scan Results\n\n${report}\n\n*See [Security tab](https://github.com/${context.repo.owner}/${context.repo.repo}/security/code-scanning) for full SARIF results.*`
            });
