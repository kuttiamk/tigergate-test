# TigerGate CNAPP Target Simulator – SonarQube Multi-Language Configuration
# ============================================================================
# Run with: make scan-sonar
# Or manually:
#   docker run --rm \
#     -e SONAR_HOST_URL=http://localhost:9000 \
#     -e SONAR_TOKEN=your_token \
#     -v $(pwd):/usr/src \
#     sonarsource/sonar-scanner-cli:latest
# ============================================================================

sonar.projectKey=tigergate-test
sonar.projectName=TigerGate CNAPP Target Simulator
sonar.projectVersion=2.0.0
sonar.organization=tigergate

# ── Source Files ─────────────────────────────────────────────────────────────
sonar.sources=nodejs,python,php,ruby,java,api,sast_advanced,serverless
sonar.exclusions=\
    **/node_modules/**,\
    **/venv/**,\
    **/*.class,\
    **/target/**,\
    **/*.jar,\
    .git/**,\
    mega-test-project/**

# ── Language-Specific Configuration ─────────────────────────────────────────

# JavaScript (Node.js + GraphQL)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.environments=node,browser

# Python
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3

# PHP
sonar.php.coverage.reportPaths=coverage.xml

# Java
sonar.java.source=17
sonar.java.binaries=java
sonar.java.libraries=java

# ── Rules Configuration ───────────────────────────────────────────────────────
# These rules are expected to fire on this intentionally vulnerable code base:
#
# JavaScript:
#   javascript:S3649  – SQL Injection
#   javascript:S4721  – OS Command Injection
#   javascript:S1523  – eval() code execution
#   javascript:S5144  – SSRF
#   javascript:S2083  – Path Traversal
#   javascript:S6418  – Hardcoded credentials
#   javascript:S5122  – CORS wildcard
#
# Python:
#   python:S3649       – SQL Injection
#   python:S4721       – OS Command Injection
#   python:S1523       – eval() / exec()
#   python:S5144       – SSRF
#   python:S2083       – Path Traversal
#   python:S6418       – Hardcoded credentials
#   python:S2070       – MD5 / SHA-1 for cryptography
#
# PHP:
#   php:S3649          – SQL Injection
#   php:S4721          – OS Command Injection
#   php:S2083          – Path Traversal
#   php:S5131          – XSS reflected
#
# Java:
#   java:S3649         – SQL Injection
#   java:S4721         – OS Command Injection
#   java:S5144         – SSRF
#   java:S2083         – Path Traversal
#   java:S4508         – Insecure deserialization
#   java:S2611         – XXE
#   java:S6418         – Hardcoded credentials
#   java:S2070         – MD5 / SHA-1

sonar.sourceEncoding=UTF-8
sonar.scm.disabled=false
sonar.scm.provider=git
