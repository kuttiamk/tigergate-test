apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable
  template:
    metadata:
      labels:
        app: vulnerable
    spec:
      hostNetwork: true # KSPM alert
      hostPID: true # KSPM alert
      hostIPC: true # KSPM alert
      automountServiceAccountToken: true # KSPM alert
      containers:
      - name: main-container
        image: nginx:1.14.2
        securityContext:
          privileged: true # KSPM alert
          runAsUser: 0 # KSPM alert
          allowPrivilegeEscalation: true # KSPM alert
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: overly-permissive-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: default
  namespace: default
