rules:
  # TigerGate CNAPP – Custom Semgrep Rules
  # Run: semgrep --config devsecops/semgrep_rules.yaml .

  # ── Python: Dangerous eval / exec patterns ──────────────────────────────────
  - id: tigergate-python-eval-injection
    patterns:
      - pattern: eval(request.$X.get(...))
      - pattern: eval(request.args.get(...))
      - pattern: eval(request.json.get(...))
    message: "🔴 RCE: eval() with user-controlled input (CWE-94)"
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-94
      owasp: A3:2021

  - id: tigergate-python-subprocess-shell
    pattern: subprocess.check_output($CMD, shell=True)
    message: "🔴 OS Command Injection: subprocess with shell=True and variable command (CWE-78)"
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-78

  # ── JavaScript: Dangerous patterns ──────────────────────────────────────────
  - id: tigergate-js-eval
    patterns:
      - pattern: eval($INPUT)
      - pattern: new Function($INPUT)
    message: "🔴 JavaScript eval() with dynamic input — RCE risk"
    languages: [javascript]
    severity: ERROR

  - id: tigergate-js-child-process
    pattern: |
      require('child_process').exec($CMD, ...)
    message: "🔴 child_process.exec with dynamic command — OS injection possible"
    languages: [javascript]
    severity: ERROR

  # ── SQL Injection: string formatting in queries ──────────────────────────────
  - id: tigergate-python-sqli-fstring
    patterns:
      - pattern: cursor.execute(f"...{$X}...")
      - pattern: cursor.execute("..." + $X + "...")
    message: "🔴 SQL Injection: f-string or concatenation in cursor.execute() (CWE-89)"
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: A3:2021

  # ── Hardcoded Secrets ────────────────────────────────────────────────────────
  - id: tigergate-hardcoded-aws-key
    pattern: |
      $VAR = "AKIA..."
    message: "🔴 Hardcoded AWS Access Key ID detected (CWE-798)"
    languages: [python, javascript, java, go]
    severity: ERROR
    metadata:
      cwe: CWE-798

  - id: tigergate-jwt-none-alg
    patterns:
      - pattern: jwt.decode($TOKEN, options={"verify_signature": False})
      - pattern: jwt.decode($TOKEN, algorithms=["none"])
    message: "🔴 JWT None Algorithm: signature verification disabled (CVE-2015-9235)"
    languages: [python]
    severity: ERROR

  # ── Terraform: Critical IaC misconfigs ─────────────────────────────────────
  - id: tigergate-tf-public-s3
    patterns:
      - pattern: |
          resource "aws_s3_bucket_acl" $NAME {
            ...
            acl = "public-read"
            ...
          }
      - pattern: |
          resource "aws_s3_bucket_acl" $NAME {
            ...
            acl = "public-read-write"
            ...
          }
    message: "🔴 Public S3 bucket ACL detected — data may be publicly accessible"
    languages: [hcl]
    severity: ERROR

  - id: tigergate-tf-rds-public
    pattern: |
      resource "aws_db_instance" $NAME {
        ...
        publicly_accessible = true
        ...
      }
    message: "🔴 RDS instance publicly accessible from internet (CIS AWS 2.3.2)"
    languages: [hcl]
    severity: ERROR
