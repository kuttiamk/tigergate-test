# =============================================================================
# sonar-project.properties – SonarQube Scanner Configuration
# =============================================================================
# PURPOSE: Tells SonarQube HOW to scan this monorepo project.
#
# HOW TO RUN SCAN (after SonarQube is running at localhost:9000):
#   sonar-scanner \
#     -Dsonar.host.url=http://localhost:9000 \
#     -Dsonar.token=YOUR_SONAR_TOKEN
#
# OR using Docker:
#   docker run --rm \
#     -e SONAR_HOST_URL="http://host.docker.internal:9000" \
#     -e SONAR_TOKEN="YOUR_SONAR_TOKEN" \
#     -v "$(pwd):/usr/src" \
#     sonarsource/sonar-scanner-cli
#
# WHAT SONARQUBE WILL FIND IN THIS PROJECT:
#   - Security Hotspots: Hardcoded credentials, SQL injection risks
#   - Code Smells: Long functions, duplicate code, poor naming
#   - Bugs: Null pointer risks, resource leaks
#   - Vulnerabilities: XSS, injection flaws
# =============================================================================

# Project Identification
sonar.projectKey=mega-test-project
sonar.projectName=Mega Test Project (SonarQube + Tigergate Demo)
sonar.projectVersion=1.0

# Source Encoding
sonar.sourceEncoding=UTF-8

# =============================================================================
# SOURCE DIRECTORIES
# We include all backend + frontend source directories
# =============================================================================
sonar.sources=frontend/src,backend-node,backend-python,vulnerable-php,database

# Java needs special treatment (compiled bytecode path)
# The Java sources are scanned separately via sonar.modules below

# =============================================================================
# EXCLUSIONS – What NOT to scan
# =============================================================================
sonar.exclusions=\
  **/node_modules/**,\
  **/vendor/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/target/**,\
  **/.git/**,\
  **/dist/**,\
  **/.vite/**

# =============================================================================
# TEST SOURCE DIRECTORIES
# =============================================================================
sonar.tests=frontend/src/__tests__

# =============================================================================
# LANGUAGE-SPECIFIC SETTINGS
# =============================================================================

# JavaScript / TypeScript (Frontend + Node.js backend)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Python (Flask backend)
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend-python/coverage.xml

# PHP
sonar.php.coverage.reportPaths=vulnerable-php/coverage.xml

# =============================================================================
# QUALITY GATE
# Lower thresholds so freshers can see MORE issues immediately
# =============================================================================
sonar.qualitygate.wait=true

# =============================================================================
# MULTI-MODULE SETUP (for Java Spring Boot)
# =============================================================================
sonar.modules=java-module

java-module.sonar.projectBaseDir=backend-java
java-module.sonar.sources=src/main/java
java-module.sonar.java.binaries=target/classes
java-module.sonar.java.source=17
