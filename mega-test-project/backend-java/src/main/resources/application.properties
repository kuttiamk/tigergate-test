# Spring Boot Application Properties
# =============================================================================
# ⚠️  INTENTIONAL ISSUES:
#   1. BAD: Credentials hardcoded here (even if overridable by env vars)
#   2. BAD: spring.jpa.show-sql=true logs ALL SQL queries (performance + info leak)
#   3. BAD: ddl-auto=update in production — can alter production schema!
#   4. BAD: Actuator endpoints all exposed without authentication
#   5. BAD: Error details exposed to end users
# =============================================================================

# Database Connection — BAD: All hardcoded here
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:megadb}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}     # BAD: Hardcoded fallback!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# BAD: show-sql logs every query including those with sensitive data
spring.jpa.show-sql=true                                              # BAD!
spring.jpa.properties.hibernate.format_sql=true
# BAD: update can modify live schema — should be validate or none
spring.jpa.hibernate.ddl-auto=update                                  # BAD!

# Application Port
server.port=8080

# BAD: Detailed error messages returned to clients
server.error.include-message=always                                   # BAD!
server.error.include-stacktrace=always                                # BAD: Stack trace to client!
server.error.include-binding-errors=always

# BAD: All Spring Actuator endpoints exposed (health, env, beans, heapdump, etc.)
management.endpoints.web.exposure.include=*                           # BAD!
management.endpoint.health.show-details=always
# BAD: Endpoint gives full environment dump including passwords
management.endpoint.env.enabled=true                                  # BAD!

# Logging — BAD: DEBUG level logs everything including SQL with params
logging.level.root=DEBUG                                              # BAD: Too verbose!
logging.level.com.megacorp=DEBUG
